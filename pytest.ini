[pytest]
pythonpath = src
testpaths = tests
# importlib mode allows same-basename test modules across subfolders
# (e.g. tests/integration/test_checkpoint_respawn.py AND
#  tests/regression/test_checkpoint_respawn.py) without requiring __init__.py.
addopts = --import-mode=importlib
norecursedirs = tests/helpers tests/fixtures tests/data tests/prompts tests/prompts_out

filterwarnings =
    ignore:pkg_resources is deprecated as an API:UserWarning
